# SiMBA Therapeutic Music Model Configuration
# Updated for EnCodec + Biofeedback

model:
  name: "Nexus-Audio"
  d_model: 512          # Hidden dimension
  n_layers: 8           # Number of Mamba blocks
  d_state: 16           # SSM state dimension
  d_conv: 4             # Local convolution width
  expand: 2             # Block expansion factor
  max_seq_len: 8192     # Maximum sequence length

audio:
  # EnCodec settings (24kHz for better compatibility)
  sample_rate: 24000
  encodec_bandwidth: 6.0  # kbps (6.0 = 8 codebooks)
  # Vocab is fixed by EnCodec: 1024 per codebook
  
therapeutic:
  use_biofeedback: true
  
  # Bass enhancement for insulin release (ETH Zurich study)
  # "Music-triggered release of insulin" - Nature 2023
  bass_freq_min: 50     # Hz
  bass_freq_max: 60     # Hz
  bass_boost_db: 6      # dB boost
  
  # High-frequency components for glucose tolerance
  # "Effect of sounds containing HFC on glucose tolerance" - Scientific Reports 2022
  hfc_freq_min: 16000   # Hz
  hfc_freq_max: 12000   # Hz (limited to Nyquist of 24kHz sample rate)
  hfc_preserve: true
  
  # Binaural beats for brain entrainment
  binaural:
    theta_hz: 6         # Relaxation, parasympathetic activation
    beta_hz: 22         # Anxiety reduction, alertness
    base_freq: 200      # Carrier frequency
  
  # Protocol phases (30 min total)
  protocol:
    activation_duration_min: 5
    modulation_duration_min: 15
    consolidation_duration_min: 10

training:
  batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 3.0e-4
  warmup_steps: 1000
  max_steps: 100000
  fp16: true
  gradient_checkpointing: true
  
  optimizer:
    name: "adamw"
    betas: [0.9, 0.95]
    weight_decay: 0.1
    
  scheduler:
    name: "cosine"
    min_lr: 3.0e-5

data:
  train_path: "./data/train"
  val_path: "./data/val"
  chunk_length_sec: 10
  augmentation:
    pitch_shift: true
    time_stretch: true
    noise_injection: false

logging:
  project: "nexus-audio"
  log_every_n_steps: 100
  save_every_n_steps: 1000
  eval_every_n_steps: 500
